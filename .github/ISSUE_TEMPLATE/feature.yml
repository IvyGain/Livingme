name: ✨ Feature
description: 新機能・機能追加の提案
title: "[Feature] "
labels: ["type:feature", "state:pending"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を実現したいか、1-3行で
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景 / Why
      description: なぜこの機能が必要か（課題・ユーザーストーリー）
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ基準
      description: Done の定義をチェックリストで
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: CCAGI Phase
      options:
        - phase:1-requirements
        - phase:2-design
        - phase:3-planning
        - phase:4-implementation
        - phase:5-testing
        - phase:6-documentation
        - phase:7-deployment
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - priority:P0-Critical
        - priority:P1-High
        - priority:P2-Medium
        - priority:P3-Low
      default: 2
